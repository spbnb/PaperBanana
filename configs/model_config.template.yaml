# Model and API Configuration for PaperVizAgent

# Default Models (must not be empty — used for all generation calls)
defaults:
  main_model_name: "gemini-3.1-pro-preview"
  image_gen_model_name: "gemini-3.1-flash-image-preview"
  image_size: "1K"  # Optional default image resolution: 1K / 2K / 4K
  
# API Keys. If you are using all gemini models, you can leave the other keys empty.
api_keys:
  google_api_key: "" # e.g. "xxxxxxxxxxxxx"
  openai_api_key: ""
  anthropic_api_key: ""
  openrouter_api_key: "" # e.g. "sk-or-v1-xxxxx". Set model_name to "openrouter/<model>" to use.

# Optional custom API base URLs (useful for proxy / compatible gateways).
endpoints:
  # You may set either root form (.../v1) or endpoint form
  # (.../v1/chat/completions or .../v1/responses).
  # The code will normalize endpoint-form URLs automatically.
  openai_base_url: "https://api-slb.packyapi.com/v1/chat/completions"
  openrouter_base_url: "https://api-slb.packyapi.com/v1/chat/completions"

# Text generation API mode for OpenAI-compatible clients.
# Supported values: "chat" (default), "responses"
api_modes:
  openai_text_api: "chat"
  openrouter_text_api: "chat"
